name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  package:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: ver
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Stage release tree
        shell: pwsh
        run: |
          $stage = "phpvm-windows-${{ steps.ver.outputs.version }}"
          New-Item -ItemType Directory -Path $stage -Force | Out-Null
          Copy-Item -Path 'phpvm.ps1','install.ps1','uninstall.ps1','README.md','LICENSE','CHANGELOG.md' -Destination $stage
          Copy-Item -Path 'lib','profile','assets' -Destination $stage -Recurse
          "$stage" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "STAGE=$stage" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Zip
        shell: pwsh
        run: |
          $zip = "phpvm-windows-${{ steps.ver.outputs.version }}.zip"
          Compress-Archive -Path "$env:STAGE/*" -DestinationPath $zip -Force
          $hash = (Get-FileHash $zip -Algorithm SHA256).Hash
          "$hash  $zip" | Out-File -FilePath "$zip.sha256" -Encoding ascii
          "ZIP=$zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: |
            ${{ env.ZIP }}
            ${{ env.ZIP }}.sha256
